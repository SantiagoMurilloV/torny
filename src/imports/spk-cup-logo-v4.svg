<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1746"/>
      <stop offset="100%" stop-color="#00072E"/>
    </linearGradient>
    <linearGradient id="glass" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="38%" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="62%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="hotspot" cx="28%" cy="18%" r="55%">
      <stop offset="0%" stop-color="#7BA8FF" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#7BA8FF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#7BA8FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fondo + capa avidriada -->
  <rect width="500" height="500" rx="28" fill="url(#bg)"/>
  <rect width="500" height="500" rx="28" fill="url(#hotspot)"/>
  <rect width="500" height="500" rx="28" fill="url(#glass)"/>

  <!-- Franja diagonal sutil -->
  <polygon points="0,310 500,170 500,200 0,340" fill="#E31E24" opacity="0.07"/>

  <!-- ── COPA geométrica centrada ── -->
  <g transform="translate(250, 148)">
    <polygon points="-52,-58 52,-58 38,38 -38,38" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linejoin="round"/>
    <line x1="-30" y1="10" x2="30" y2="10" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
    <polyline points="-52,-28 -76,-28 -76,18 -52,18" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    <polyline points="52,-28 76,-28 76,18 52,18" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    <line x1="-10" y1="38" x2="-10" y2="58" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <line x1="10" y1="38" x2="10" y2="58" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <line x1="-36" y1="58" x2="36" y2="58" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="0" cy="-72" r="5" fill="#E31E24"/>
    <line x1="0" y1="-67" x2="0" y2="-58" stroke="#E31E24" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Línea roja separadora -->
  <rect x="40" y="236" width="420" height="3" rx="1.5" fill="#E31E24"/>

  <!-- ── TORNY centrado (Y final en rojo como acento) ── -->
  <text
    x="250"
    y="378"
    font-family="'Archivo Black','Arial Black','Impact','Haettenschweiler',sans-serif"
    font-weight="900"
    font-size="116"
    letter-spacing="8"
    text-anchor="middle"
    dominant-baseline="auto"
    fill="#FFFFFF">TORN<tspan fill="#E31E24">Y</tspan></text>

  <!-- Línea separadora blanca sutil -->
  <rect x="40" y="404" width="420" height="0.75" rx="0.5" fill="#FFFFFF" opacity="0.10"/>

  <!-- Tagline -->
  <text
    x="250"
    y="448"
    font-family="'Arial',sans-serif"
    font-weight="400"
    font-size="11"
    letter-spacing="5"
    text-anchor="middle"
    fill="#FFFFFF"
    opacity="0.22">VOLLEYBALL TOURNAMENTS</text>

  <!-- Esquinas decorativas -->
  <g stroke="#E31E24" stroke-width="2.5" fill="none" opacity="0.8" stroke-linecap="round">
    <path d="M16 46 L16 16 L46 16"/>
    <path d="M454 16 L484 16 L484 46"/>
    <path d="M16 454 L16 484 L46 484"/>
    <path d="M454 484 L484 484 L484 454"/>
  </g>

</svg>
